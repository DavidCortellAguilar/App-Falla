; =====================================================================
; .user.ini – Configuración PHP para Hostinger
; Aplica a todas las peticiones PHP en este directorio
; =====================================================================

; Memoria y tiempo (ajusta según límites del plan)
memory_limit = 256M
max_execution_time = 60
max_input_time = 60

; Subida de archivos
upload_max_filesize = 10M
post_max_size = 12M

; Errores: nunca mostrar en producción
display_errors = Off
display_startup_errors = Off
log_errors = On

; Seguridad
expose_php = Off
session.use_strict_mode = 1
session.use_only_cookies = 1
session.cookie_httponly = 1
session.cookie_samesite = Lax
